<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">
    <h2>💬 Chat Room</h2>

    <input id="name" placeholder="Enter your name" />
    
    <div id="chat-box"></div>

    <div class="input-area">
        <input id="message" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>
<div class="dashboard">
    <h3>📊 Dashboard</h3>

    <p>Total Users: <span id="userCount">0</span></p>
    <p>Server Uptime: <span id="uptime">0</span> sec</p>

    <h4>Active Users</h4>
    <ul id="userList"></ul>

    <h4>Messages Count</h4>
    <ul id="messageStats"></ul>

    <h4>Left Users</h4>
    <ul id="leftUsers"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs"></script>
<script src="app.js"></script>

</body>
</html>
